<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indie Analytics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: #e5e5e5; padding: 20px; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 24px; color: #C8A45C; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
.card { background: #1a1a1a; border-radius: 12px; padding: 16px; }
.card-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.card-value { font-size: 28px; font-weight: 600; }
.card-sub { font-size: 11px; color: #666; margin-top: 2px; }
.gold { color: #C8A45C; }
.green { color: #4ade80; }
.blue { color: #60a5fa; }
.purple { color: #a78bfa; }
.section { background: #1a1a1a; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.section-title { font-size: 14px; font-weight: 500; color: #888; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; color: #666; padding: 6px 0; border-bottom: 1px solid #222; font-weight: 500; }
td { font-size: 13px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
.badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 6px; }
.badge-iap { background: #1a3a1a; color: #4ade80; }
.badge-offer { background: #3a2a1a; color: #C8A45C; }
.badge-dl { background: #1a2a3a; color: #60a5fa; }
.login-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; }
.login-wrap input { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 16px; color: #e5e5e5; font-size: 14px; width: 280px; text-align: center; }
.login-wrap button { background: #C8A45C; color: #0a0a0a; border: none; border-radius: 8px; padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; background: #222; color: #888; border: none; }
.tab.active { background: #C8A45C; color: #0a0a0a; }
.error { color: #f87171; font-size: 13px; margin-top: 8px; }
.btn-sm { background: none; border: 1px solid #333; color: #888; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
.btn-sm:hover { border-color: #555; color: #ccc; }
.btn-del { background: none; border: none; color: #555; cursor: pointer; font-size: 14px; padding: 2px 6px; }
.btn-del:hover { color: #f87171; }
.btn-danger { background: none; border: 1px solid #7f1d1d; color: #f87171; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
.btn-danger:hover { background: #7f1d1d; color: #fecaca; }
.confirm-bar { background: #1a1a1a; border: 1px solid #7f1d1d; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.confirm-bar span { font-size: 13px; color: #f87171; }
</style>
</head>
<body>

<div id="loginView" class="login-wrap">
  <h1>Indie Analytics</h1>
  <input type="password" id="keyInput" placeholder="Enter service_role key" />
  <button onclick="login()">Unlock</button>
  <div id="loginError" class="error"></div>
</div>

<div id="dashboard" style="display:none;">
  <h1>Indie Analytics</h1>

  <div id="confirmBar" class="confirm-bar" style="display:none;">
    <span id="confirmText"></span>
    <div>
      <button class="btn-sm" onclick="cancelDelete()">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()" style="margin-left:8px;">Delete</button>
    </div>
  </div>

  <div class="tabs" id="appTabs">
    <button class="tab active" onclick="filterApp('all', this)">All</button>
    <button class="tab" onclick="filterApp('personalcapsule', this)">PersonalCapsule</button>
    <button class="tab" onclick="filterApp('yula', this)">Yula</button>
    <button class="tab" onclick="filterApp('appconsol', this)">AppConsol</button>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-label">Total downloads</div>
      <div class="card-value blue" id="totalDownloads">-</div>
      <div class="card-sub" id="todayDownloads"></div>
    </div>
    <div class="card">
      <div class="card-label">Total purchases</div>
      <div class="card-value green" id="totalPurchases">-</div>
      <div class="card-sub" id="todayPurchases"></div>
    </div>
    <div class="card">
      <div class="card-label">Revenue</div>
      <div class="card-value gold" id="totalRevenue">-</div>
      <div class="card-sub" id="offerCount"></div>
    </div>
    <div class="card">
      <div class="card-label">Conversion</div>
      <div class="card-value purple" id="conversionRate">-</div>
      <div class="card-sub">purchases / downloads</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">
      <span>Downloads by country</span>
    </div>
    <table>
      <thead><tr><th>Country</th><th>Downloads</th><th>Purchases</th></tr></thead>
      <tbody id="countryTable"></tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-title">
      <span>Recent events</span>
      <button class="btn-danger" onclick="askDeleteAll()">Clear all</button>
    </div>
    <table>
      <thead><tr><th>Time</th><th>Event</th><th>Source</th><th>Locale</th><th></th></tr></thead>
      <tbody id="eventsTable"></tbody>
    </table>
  </div>

  <div style="text-align:center;padding:20px;">
    <button class="btn-sm" onclick="loadData()">Refresh</button>
    <button class="btn-sm" onclick="logout()" style="margin-left:8px;">Logout</button>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://vpsmaqsessodayyjamnd.supabase.co';
var SECRET_KEY = '';
var allEvents = [];
var currentApp = 'all';
var pendingDeleteIds = [];
var pendingDeleteAll = false;

function login() {
  SECRET_KEY = document.getElementById('keyInput').value.trim();
  if (!SECRET_KEY) return;
  document.getElementById('loginError').textContent = '';
  loadData().then(function(ok) {
    if (ok) {
      localStorage.setItem('sb_key_v2', SECRET_KEY);
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
    }
  });
}

function logout() {
  localStorage.removeItem('sb_key_v2');
  SECRET_KEY = '';
  allEvents = [];
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
  document.getElementById('keyInput').value = '';
}

function init() {
  var saved = localStorage.getItem('sb_key_v2');
  if (saved) {
    SECRET_KEY = saved;
    loadData().then(function(ok) {
      if (ok) {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      } else {
        localStorage.removeItem('sb_key_v2');
      }
    });
  }
}

function loadData() {
  return fetch(SUPABASE_URL + '/rest/v1/events?select=*&order=created_at.desc&limit=5000', {
    headers: { 'apikey': SECRET_KEY, 'Authorization': 'Bearer ' + SECRET_KEY }
  }).then(function(res) {
    if (!res.ok) {
      document.getElementById('loginError').textContent = 'Invalid key or API error (HTTP ' + res.status + ')';
      return false;
    }
    return res.json().then(function(data) {
      allEvents = data;
      render();
      return true;
    });
  }).catch(function(e) {
    document.getElementById('loginError').textContent = 'Connection error: ' + e.message;
    return false;
  });
}

function deleteEvent(id) {
  pendingDeleteIds = [id];
  pendingDeleteAll = false;
  document.getElementById('confirmText').textContent = 'Delete this event?';
  document.getElementById('confirmBar').style.display = 'flex';
}

function askDeleteAll() {
  var events = currentApp === 'all' ? allEvents : allEvents.filter(function(e) { return e.app === currentApp; });
  pendingDeleteIds = events.map(function(e) { return e.id; });
  pendingDeleteAll = true;
  var label = currentApp === 'all' ? 'all ' + events.length + ' events' : events.length + ' ' + currentApp + ' events';
  document.getElementById('confirmText').textContent = 'Delete ' + label + '?';
  document.getElementById('confirmBar').style.display = 'flex';
}

function cancelDelete() {
  pendingDeleteIds = [];
  pendingDeleteAll = false;
  document.getElementById('confirmBar').style.display = 'none';
}

function confirmDelete() {
  if (pendingDeleteIds.length === 0) return;

  var filter = pendingDeleteAll && currentApp !== 'all'
    ? '?app=eq.' + currentApp
    : pendingDeleteIds.length === 1
      ? '?id=eq.' + pendingDeleteIds[0]
      : '?id=in.(' + pendingDeleteIds.join(',') + ')';

  fetch(SUPABASE_URL + '/rest/v1/events' + filter, {
    method: 'DELETE',
    headers: { 'apikey': SECRET_KEY, 'Authorization': 'Bearer ' + SECRET_KEY }
  }).then(function(res) {
    if (res.ok) {
      cancelDelete();
      loadData();
    }
  });
}

function filterApp(app, btn) {
  currentApp = app;
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  btn.classList.add('active');
  cancelDelete();
  render();
}

function render() {
  var events = currentApp === 'all' ? allEvents : allEvents.filter(function(e) { return e.app === currentApp; });
  var today = new Date().toISOString().slice(0, 10);

  var downloads = events.filter(function(e) { return e.event === 'download'; });
  var purchases = events.filter(function(e) { return e.event === 'purchase'; });
  var iapPurchases = purchases.filter(function(e) { return e.source === 'inApp'; });
  var offerPurchases = purchases.filter(function(e) { return e.source === 'offerCode'; });

  var todayDL = downloads.filter(function(e) { return e.created_at && e.created_at.startsWith(today); }).length;
  var todayPR = purchases.filter(function(e) { return e.created_at && e.created_at.startsWith(today); }).length;

  var revenue = 0;
  iapPurchases.forEach(function(e) {
    if (e.price) revenue += parseFloat(e.price);
  });

  document.getElementById('totalDownloads').textContent = downloads.length;
  document.getElementById('todayDownloads').textContent = todayDL + ' today';
  document.getElementById('totalPurchases').textContent = purchases.length;
  document.getElementById('todayPurchases').textContent = todayPR + ' today';
  document.getElementById('totalRevenue').textContent = '$' + revenue.toFixed(2);
  document.getElementById('offerCount').textContent = offerPurchases.length + ' offer codes';

  var convRate = downloads.length > 0 ? ((purchases.length / downloads.length) * 100).toFixed(1) : '0';
  document.getElementById('conversionRate').textContent = convRate + '%';

  var countries = {};
  events.forEach(function(e) {
    var loc = e.locale || '??';
    if (!countries[loc]) countries[loc] = { dl: 0, pr: 0 };
    if (e.event === 'download') countries[loc].dl++;
    if (e.event === 'purchase') countries[loc].pr++;
  });

  var sorted = Object.entries(countries).sort(function(a, b) { return (b[1].dl + b[1].pr) - (a[1].dl + a[1].pr); });
  document.getElementById('countryTable').innerHTML = sorted.map(function(item) {
    return '<tr><td>' + item[0].toUpperCase() + '</td><td>' + item[1].dl + '</td><td>' + item[1].pr + '</td></tr>';
  }).join('');

  var recent = events.slice(0, 30);
  document.getElementById('eventsTable').innerHTML = recent.map(function(e) {
    var d = new Date(e.created_at);
    var time = d.toLocaleDateString('tr-TR', { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
    var badge = e.event === 'download' ? '<span class="badge badge-dl">download</span>'
      : e.source === 'offerCode' ? '<span class="badge badge-offer">offer code</span>'
      : '<span class="badge badge-iap">purchase</span>';
    var price = e.price ? e.price + ' ' + (e.currency || '') : '';
    var del = '<button class="btn-del" onclick="deleteEvent(' + e.id + ')">✕</button>';
    return '<tr><td>' + time + '</td><td>' + badge + '</td><td>' + (price || e.source || '-') + '</td><td>' + (e.locale || '??').toUpperCase() + '</td><td>' + del + '</td></tr>';
  }).join('');
}

init();
</script>
</body>
</html>
